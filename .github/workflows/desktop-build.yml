name: Desktop builds

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to receive desktop installers
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            command: npm run package:win
            artifact: windows-x64
          - os: macos-14
            command: npm run package:mac
            artifact: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test -- --run src/phone/PhoneController.test.tsx src/editor/phone/phoneCameraControl.test.ts
      - run: npm run build
      - run: ${{ matrix.command }}
      - uses: actions/upload-artifact@v4
        with:
          name: ai-director-desk-${{ matrix.artifact }}
          path: |
            release/*.dmg
            release/*.zip
            release/*Setup.exe
            release/*Portable.exe
          if-no-files-found: error
      - name: Upload installers to release
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          files=()
          while IFS= read -r -d '' file; do
            files+=("$file")
          done < <(find release -maxdepth 1 -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*Setup.exe' -o -name '*Portable.exe' \) -print0)
          test ${#files[@]} -gt 0
          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
